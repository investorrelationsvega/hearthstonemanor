<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Hearthstone Manor brand mark
       Forest green rounded square with a gold serif H. Background
       and accent match the Mountain Lodge palette used across the
       site. Designed to read at favicon sizes (16x16 and up) while
       still feeling like a finished mark at the larger sizes used
       for apple-touch-icon and PWA install icons. -->
  <rect width="64" height="64" rx="13" ry="13" fill="#2D4A35"/>
  <!-- Gold H. Two vertical strokes plus a center crossbar. The
       small triangular serifs at the top/bottom of each stroke
       give it a slab-serif feel that ties to Zilla Slab. -->
  <g fill="#C8A96E">
    <!-- left stroke + serifs -->
    <rect x="14" y="18" width="7" height="28"/>
    <rect x="11" y="16" width="13" height="3"/>
    <rect x="11" y="45" width="13" height="3"/>
    <!-- right stroke + serifs -->
    <rect x="43" y="18" width="7" height="28"/>
    <rect x="40" y="16" width="13" height="3"/>
    <rect x="40" y="45" width="13" height="3"/>
    <!-- crossbar -->
    <rect x="21" y="29" width="22" height="6"/>
  </g>
</svg>
