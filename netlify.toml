[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: let React Router handle client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Deploy previews for every PR / branch push
[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"
